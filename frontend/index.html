<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff3366' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='22 12 18 12 15 21 9 3 6 12 2 12'/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulseIQ Platform</title>
    <!-- GLOBAL ERROR HANDLER FOR AUTONOMOUS DEBUGGING -->
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div id="fatal-runtime-err" style="position:fixed;top:0;left:0;padding:20px;background:red;color:white;z-index:99999;width:100vw;height:100vh;"><h2>FATAL CRASH</h2><pre>' + e.message + '\n' + (e.error ? e.error.stack : '') + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div id="fatal-runtime-err" style="position:fixed;top:0;left:0;padding:20px;background:red;color:white;z-index:99999;width:100vw;height:100vh;"><h2>PROMISE CRASH</h2><pre>' + String(event.reason) + '</pre></div>';
      });
      
      const originalConsoleError = console.error;
      console.error = function(...args) {
          document.body.innerHTML += '<div id="fatal-runtime-err-console" style="position:fixed;top:0;left:0;padding:20px;background:maroon;color:white;z-index:99999;width:100vw;height:100vh;"><h2>CONSOLE ERROR</h2><pre>' + args.join(" ") + '</pre></div>';
          originalConsoleError.apply(console, args);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
